<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PH Estate Manager V2</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f8f7;color:#111827;display:grid;place-items:center;min-height:100vh;margin:0;padding:20px}
    .box{background:white;border:1px solid #d1d5db;border-radius:18px;padding:24px;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    h1{margin:0 0 8px;color:#064e3b}p{line-height:1.5}.muted{color:#6b7280}.err{color:#b91c1c;white-space:pre-wrap}.btn{display:inline-block;background:#047857;color:white;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="box" id="loaderBox">
    <h1>PH Estate Manager V2</h1>
    <p><strong>Loading Development Stage 21.6...</strong></p>
    <p class="muted">Loading stable app shell without document.write and applying the current version safely.</p>
    <p id="loaderMsg" class="muted">Starting...</p>
  </div>

  <script>
    (async function(){
      const VERSION = "21.6";
      const SHELL_URL = "https://cdn.jsdelivr.net/gh/hphmhc/PH-Estate-Manager-V2@8e2aba764d0bb0ceb0e46de8954c91b4e4456d67/index.html";
      const CONFIG_URL = "config.js?v=21.6";
      const APP_URL = "app.js?v=21.6";
      const SUPABASE_URL = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
      const msg = document.getElementById("loaderMsg");

      function setMsg(text){ if(msg) msg.textContent = text; }

      function loadScript(src){
        return new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.async = false;
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load script: " + src));
          document.body.appendChild(s);
        });
      }

      async function runTextScript(url, transform){
        const res = await fetch(url + "&cache=" + Date.now(), { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to load script text: " + url + " status " + res.status);
        let code = await res.text();
        if(transform) code = transform(code);
        const s = document.createElement("script");
        s.textContent = code;
        document.body.appendChild(s);
      }

      function patchConfig(code){
        return code
          .split('stage: "stage-21"').join('stage: "stage-21.6"')
          .split('const STAGE = "Development Stage 21"').join('const STAGE = "Development Stage 21.6"')
          .split('h.textContent = "Stage 21 Status"').join('h.textContent = "Stage 21.6 Status"')
          .split('Seller Payments workflow added. Seller/land payments can now be saved from the Seller page into Daily Accounts.')
          .join('Stage 21.6 active. Seller Payments, Agent Commission, and Sale Deal Payments are loaded.');
      }

      try{
        setMsg("Fetching app shell...");
        const shellRes = await fetch(SHELL_URL + "?cache=" + Date.now(), { cache: "no-store" });
        if(!shellRes.ok) throw new Error("App shell request failed: " + shellRes.status);
        let html = await shellRes.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        document.head.innerHTML = doc.head.innerHTML
          .replace(/styles\.css\?v=15/g, "styles.css?v=" + VERSION);
        document.body.innerHTML = doc.body.innerHTML;

        const staticLabel = document.querySelector(".sidebar-brand small");
        if(staticLabel) staticLabel.textContent = "Development Stage " + VERSION;
        const staticStage = [...document.querySelectorAll("#page-dashboard .panel h2")].find(x => x.textContent.includes("Stage"));
        if(staticStage){
          staticStage.textContent = "Stage " + VERSION + " Status";
          const p = staticStage.parentElement && staticStage.parentElement.querySelector("p");
          if(p) p.textContent = "Stage 21.6 active. Seller Payments, Agent Commission, and Sale Deal Payments are loaded.";
        }

        setMsg("Loading Supabase...");
        await loadScript(SUPABASE_URL);
        setMsg("Loading app config...");
        await runTextScript(CONFIG_URL, patchConfig);
        setMsg("Loading app logic...");
        await loadScript(APP_URL);
      }catch(err){
        document.body.innerHTML = `<div class="box"><h1>PH Estate Manager V2</h1><p class="err">Stage 21.6 load failed: ${String(err.message || err)}</p><p>This is a loading issue, not a database or password issue.</p><a class="btn" href="./?v=21.6&retry=1">Retry</a></div>`;
      }
    })();
  </script>
</body>
</html>
