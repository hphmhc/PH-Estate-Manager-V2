<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PH Estate Manager V2</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f8f7;color:#111827;display:grid;place-items:center;min-height:100vh;margin:0;padding:20px}
    .box{background:white;border:1px solid #d1d5db;border-radius:18px;padding:24px;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    h1{margin:0 0 8px;color:#064e3b}p{line-height:1.5}.muted{color:#6b7280}.err{color:#b91c1c;white-space:pre-wrap}.btn{display:inline-block;background:#047857;color:white;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="box" id="loaderBox">
    <h1>PH Estate Manager V2</h1>
    <p><strong>Repairing app load...</strong></p>
    <p class="muted">Stage 21.4 is restoring the stable app shell and loading config normally.</p>
    <p id="loaderMsg" class="muted">Starting...</p>
  </div>
  <script>
    (async function(){
      const VERSION = "21.4";
      const STABLE_INDEX_URL = "https://raw.githubusercontent.com/hphmhc/PH-Estate-Manager-V2/8e2aba764d0bb0ceb0e46de8954c91b4e4456d67/index.html";
      const msg = document.getElementById("loaderMsg");
      try {
        msg.textContent = "Fetching stable app shell...";
        const res = await fetch(STABLE_INDEX_URL + "?cache=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("Could not load stable app shell: " + res.status);
        let html = await res.text();
        html = html
          .replace(/styles\.css\?v=15/g, "styles.css?v=" + VERSION)
          .replace(/config\.js\?v=15/g, "config.js?v=21&cache=" + Date.now())
          .replace(/app\.js\?v=15/g, "app.js?v=" + VERSION)
          .replace(/Development Stage 15/g, "Development Stage 21")
          .replace(/Stage 15 Status/g, "Stage 21 Status")
          .replace(/Sale Deals page added with linked clients, plots, payment summary, and status view\./g, "Stage 21 repaired. Seller Payments, Agent Commission, and Sale Deal Payments are loaded through config.js.");
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        document.getElementById("loaderBox").innerHTML = `<h1>PH Estate Manager V2</h1><p class="err">Stage 21.4 repair failed: ${String(err.message || err)}</p><p>This is a loading issue, not a data or password issue.</p><a class="btn" href="./?v=21.4&retry=1">Retry</a>`;
      }
    })();
  </script>
</body>
</html>
