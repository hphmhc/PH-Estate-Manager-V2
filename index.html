<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PH Estate Manager V2</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f8f7;color:#111827;display:grid;place-items:center;min-height:100vh;margin:0;padding:20px}
    .box{background:white;border:1px solid #d1d5db;border-radius:18px;padding:24px;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    h1{margin:0 0 8px;color:#064e3b}p{line-height:1.5}.muted{color:#6b7280}.err{color:#b91c1c;white-space:pre-wrap}.btn{display:inline-block;background:#047857;color:white;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="box" id="loaderBox">
    <h1>PH Estate Manager V2</h1>
    <p><strong>Loading Development Stage 22...</strong></p>
    <p class="muted">Loading stable app shell and project financial summary tools.</p>
    <p id="loaderMsg" class="muted">Starting...</p>
  </div>

  <script>
    (async function(){
      const VERSION = "22";
      const SHELL_URL = "https://cdn.jsdelivr.net/gh/hphmhc/PH-Estate-Manager-V2@8e2aba764d0bb0ceb0e46de8954c91b4e4456d67/index.html";
      const CONFIG_URL = "config.js?v=22";
      const APP_URL = "app.js?v=22";
      const SUPABASE_URL = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
      const msg = document.getElementById("loaderMsg");

      function setMsg(text){ if(msg) msg.textContent = text; }

      function loadScript(src){
        return new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.async = false;
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load script: " + src));
          document.body.appendChild(s);
        });
      }

      async function runTextScript(url, transform){
        const res = await fetch(url + "&cache=" + Date.now(), { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to load script text: " + url + " status " + res.status);
        let code = await res.text();
        if(transform) code = transform(code);
        const s = document.createElement("script");
        s.textContent = code;
        document.body.appendChild(s);
      }

      function patchConfig(code){
        return code
          .split('stage: "stage-21"').join('stage: "stage-22"')
          .split('const STAGE = "Development Stage 21"').join('const STAGE = "Development Stage 22"')
          .split('h.textContent = "Stage 21 Status"').join('h.textContent = "Stage 22 Status"')
          .split('Seller Payments workflow added. Seller/land payments can now be saved from the Seller page into Daily Accounts.')
          .join('Stage 22 active. Project Financial Summary added.');
      }

      function installStage22(){
        const s = document.createElement("script");
        s.textContent = `
(function stage22ProjectFinancials(){
  const STAGE = "Development Stage 22";
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));
  const esc = v => String(v ?? "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'\"':"&quot;"}[c]));
  const fmt = v => "Rs. " + Number(v || 0).toLocaleString("en-PK");
  let activeProjectId = null;

  function ready(){ return typeof supabaseClient !== "undefined" && typeof state !== "undefined"; }
  function projectName(id){ return typeof getProjectName === "function" ? getProjectName(id) : ((state.projects || []).find(p => p.id === id)?.name || "Project"); }
  function clientName(id){ return typeof getClientName === "function" ? getClientName(id) : "-"; }
  function plotLabel(id){ return typeof getPlotLabel === "function" ? getPlotLabel(id) : "-"; }
  function categoryName(id){ return typeof getCategoryName === "function" ? getCategoryName(id) : "-"; }

  function setLabels(){
    const l = $(".sidebar-brand small");
    if(l) l.textContent = STAGE;
    const h = $$("#page-dashboard .panel h2").find(x => x.textContent.includes("Stage"));
    if(h){
      h.textContent = "Stage 22 Status";
      const p = h.parentElement && h.parentElement.querySelector("p");
      if(p) p.textContent = "Project Financial Summary added. Project money is calculated from the central ledger.";
    }
  }

  function addCss(){
    if($("#stage22Css")) return;
    const style = document.createElement("style");
    style.id = "stage22Css";
    style.textContent = ".stage22-modal{position:fixed;inset:0;background:rgba(0,0,0,.46);z-index:2147483000;display:grid;place-items:center;padding:18px}.stage22-modal.hidden{display:none!important}.stage22-box{width:min(1050px,100%);max-height:92vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 24px 70px rgba(0,0,0,.28)}.stage22-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.stage22-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}.stage22-card{border:1px solid var(--line);border-radius:14px;padding:12px;background:#f8fafc}.stage22-card small{display:block;color:var(--muted);font-weight:800;margin-bottom:4px}.stage22-badge{display:block;margin-top:7px;color:#065f46;font-weight:800;font-size:12px;line-height:1.4}@media(max-width:900px){.stage22-cards{grid-template-columns:1fr}.stage22-head{flex-direction:column}}";
    document.head.appendChild(style);
  }

  function ensureModal(){
    addCss();
    if($("#stage22ProjectModal")) return;
    const modal = document.createElement("div");
    modal.id = "stage22ProjectModal";
    modal.className = "stage22-modal hidden";
    modal.innerHTML = '<div class="stage22-box"><div class="stage22-head"><div><h2 id="stage22ProjectTitle">Project Financials</h2><p class="muted" id="stage22ProjectSub">Central ledger summary for this project.</p></div><button class="ghost" id="stage22ProjectClose" type="button">Close</button></div><div class="stage22-cards" id="stage22ProjectCards"></div><h3>Ledger Entries</h3><div class="table-wrap"><table><thead><tr><th>Date</th><th>Direction</th><th>Description</th><th>Category</th><th>Client</th><th>Plot</th><th>Amount</th><th>Status</th></tr></thead><tbody id="stage22ProjectRows"><tr><td colspan="8">No project selected.</td></tr></tbody></table></div></div>';
    document.body.appendChild(modal);
    $("#stage22ProjectClose").onclick = () => modal.classList.add("hidden");
    modal.onclick = e => { if(e.target.id === "stage22ProjectModal") modal.classList.add("hidden"); };
  }

  async function openProjectFinancials(projectId){
    if(!ready()) return alert("App is still loading.");
    activeProjectId = projectId;
    ensureModal();
    const modal = $("#stage22ProjectModal");
    modal.classList.remove("hidden");
    $("#stage22ProjectTitle").textContent = "Project Financials — " + projectName(projectId);
    $("#stage22ProjectSub").textContent = "Money in/out is calculated from active central ledger entries linked to this project.";
    $("#stage22ProjectRows").innerHTML = '<tr><td colspan="8">Loading...</td></tr>';

    const { data, error } = await supabaseClient.from("ledger_entries").select("*").eq("project_id", projectId).order("entry_date", { ascending:false });
    if(error){
      $("#stage22ProjectRows").innerHTML = '<tr><td colspan="8">' + esc(error.message) + '</td></tr>';
      return;
    }
    const rows = data || [];
    const active = rows.filter(r => r.status === "active");
    const moneyIn = active.filter(r => r.direction === "money_in").reduce((s,r)=>s+Number(r.amount||0),0);
    const moneyOut = active.filter(r => r.direction === "money_out").reduce((s,r)=>s+Number(r.amount||0),0);
    const net = moneyIn - moneyOut;
    const voided = rows.filter(r => r.status === "voided").length;
    $("#stage22ProjectCards").innerHTML = '<div class="stage22-card"><small>Money In</small><strong>' + fmt(moneyIn) + '</strong></div><div class="stage22-card"><small>Money Out</small><strong>' + fmt(moneyOut) + '</strong></div><div class="stage22-card"><small>Net Balance</small><strong>' + fmt(net) + '</strong></div><div class="stage22-card"><small>Ledger Entries</small><strong>' + rows.length + '</strong><br><small>' + voided + ' voided</small></div>';
    if(!rows.length){
      $("#stage22ProjectRows").innerHTML = '<tr><td colspan="8">No ledger entries linked to this project yet.</td></tr>';
      return;
    }
    $("#stage22ProjectRows").innerHTML = rows.map(r => '<tr class="' + (r.status === "voided" ? "voided-row" : "") + '"><td>' + esc(r.entry_date || "-") + '</td><td>' + esc(r.direction || "-") + '</td><td>' + esc(r.description || "-") + '</td><td>' + esc(categoryName(r.category_id)) + '</td><td>' + esc(r.client_id ? clientName(r.client_id) : "-") + '</td><td>' + esc(r.plot_id ? plotLabel(r.plot_id) : "-") + '</td><td>' + fmt(r.amount) + '</td><td><span class="status-badge ' + esc(r.status || "active") + '">' + esc(r.status || "active") + '</span></td></tr>').join("");
  }

  async function updateBadges(){
    const badges = $$("[data-stage22-project-badge]");
    if(!badges.length || !ready()) return;
    const ids = [...new Set(badges.map(b => b.dataset.stage22ProjectBadge))];
    const { data } = await supabaseClient.from("ledger_entries").select("project_id,direction,amount,status").in("project_id", ids);
    const rows = (data || []).filter(r => r.status === "active");
    badges.forEach(b => {
      const id = b.dataset.stage22ProjectBadge;
      const moneyIn = rows.filter(r => r.project_id === id && r.direction === "money_in").reduce((s,r)=>s+Number(r.amount||0),0);
      const moneyOut = rows.filter(r => r.project_id === id && r.direction === "money_out").reduce((s,r)=>s+Number(r.amount||0),0);
      b.textContent = "Net: " + fmt(moneyIn - moneyOut);
    });
  }

  function attachButtons(){
    if(!ready()) return;
    $$("#projectsTableBody [data-edit-project]").forEach(edit => {
      const id = edit.dataset.editProject;
      const box = edit.closest(".row-actions");
      if(!box) return;
      if(!box.querySelector('[data-stage22-project-financials="' + id + '"]')){
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "small-btn";
        btn.textContent = "Financials";
        btn.dataset.stage22ProjectFinancials = id;
        btn.onclick = () => openProjectFinancials(id);
        box.insertBefore(btn, edit);
      }
      const td = box.closest("td");
      if(td && !td.querySelector('[data-stage22-project-badge="' + id + '"]')){
        const badge = document.createElement("span");
        badge.className = "stage22-badge";
        badge.dataset.stage22ProjectBadge = id;
        badge.textContent = "Net: loading...";
        td.appendChild(badge);
      }
    });
    updateBadges();
  }

  function boot(){
    setLabels();
    ensureModal();
    attachButtons();
    const body = $("#projectsTableBody");
    if(body && !body.dataset.stage22Observer){
      body.dataset.stage22Observer = "true";
      new MutationObserver(() => setTimeout(attachButtons,100)).observe(body,{childList:true,subtree:true});
    }
    setInterval(() => { setLabels(); attachButtons(); }, 2500);
  }
  document.addEventListener("DOMContentLoaded", () => setTimeout(boot,900));
  setTimeout(boot,1200);
})();
`;
        document.body.appendChild(s);
      }

      try{
        setMsg("Fetching app shell...");
        const shellRes = await fetch(SHELL_URL + "?cache=" + Date.now(), { cache: "no-store" });
        if(!shellRes.ok) throw new Error("App shell request failed: " + shellRes.status);
        let html = await shellRes.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        document.head.innerHTML = doc.head.innerHTML
          .replace(/styles\.css\?v=15/g, "styles.css?v=" + VERSION);
        document.body.innerHTML = doc.body.innerHTML;

        const staticLabel = document.querySelector(".sidebar-brand small");
        if(staticLabel) staticLabel.textContent = "Development Stage " + VERSION;
        const staticStage = [...document.querySelectorAll("#page-dashboard .panel h2")].find(x => x.textContent.includes("Stage"));
        if(staticStage){
          staticStage.textContent = "Stage " + VERSION + " Status";
          const p = staticStage.parentElement && staticStage.parentElement.querySelector("p");
          if(p) p.textContent = "Project Financial Summary added. Project money is calculated from the central ledger.";
        }

        setMsg("Loading Supabase...");
        await loadScript(SUPABASE_URL);
        setMsg("Loading app config...");
        await runTextScript(CONFIG_URL, patchConfig);
        setMsg("Loading app logic...");
        await loadScript(APP_URL);
        installStage22();
      }catch(err){
        document.body.innerHTML = `<div class="box"><h1>PH Estate Manager V2</h1><p class="err">Stage 22 load failed: ${String(err.message || err)}</p><p>This is a loading issue, not a database or password issue.</p><a class="btn" href="./?v=22&retry=1">Retry</a></div>`;
      }
    })();
  </script>
</body>
</html>
